<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile Card</title>

    <!-- CSS FILE CONNECTED HERE -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="card">

    <!-- Profile Image -->
    <div class="profile-image">
        <img src=""https://randomuser.me/api/portraits/men/32.jpg"" alt="profile">
    </div>

    <!-- Name -->
    <h2>Alishba Habib </h2>

    <!-- Location -->
     
    <p class="location">📍 Karachi</p>

    <!-- Job -->
    <p class="job">UI/UX Designer & Front-End Developer</p>

    <!-- Buttons -->
    <div class="buttons">
        <button>Message</button>
        <button>Follow</button>
    </div>

    <!-- Skills -->
    <div class="skills">
        <h3>Skills</h3>
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
        <span>React</span>
        <span>UI/UX</span>
    </div>

</div>

</body>
</html>
